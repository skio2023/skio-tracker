<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SKI-O 雪圈｜遠端工作週報系統</title>
<style>
:root{
  --deep:#334C57;--text:#284957;--light:#DCE9EC;--mid:#5A8090;
  --pale:#EEF4F6;--white:#fff;--border:#C8D8DC;--bg:#F2F6F7;
  --gray:#6B7B80;--danger:#B83232;--success:#0F6E56;--warn:#8B5E00;
  --font:'Helvetica Neue','PingFang TC','Microsoft JhengHei',sans-serif;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;}
/* Header */
.hdr{background:var(--deep);height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 1rem;position:sticky;top:0;z-index:200;}
.hdr-logo{color:#fff;font-size:14px;font-weight:600;letter-spacing:.04em;}
.hdr-logo span{color:var(--light);font-weight:400;font-size:11px;margin-left:6px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.week-pill{background:rgba(255,255,255,.15);color:#fff;font-size:12px;padding:6px 14px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,.25);white-space:nowrap;}
.hdr-save{background:rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,.3);font-family:var(--font);}
.hdr-save:active{background:rgba(255,255,255,.35);}
.autosave-dot{width:7px;height:7px;border-radius:50%;background:#4CAF50;display:inline-block;margin-right:4px;}
/* Layout */
.wrap{max-width:1100px;margin:0 auto;padding:1rem 1rem 5rem;}
/* Dash */
.dash{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
.dcard{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:1rem;}
.dcard-title{font-size:11px;font-weight:500;color:var(--gray);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.65rem;}
.ms-list{display:flex;flex-direction:column;gap:6px;}
.ms-row{display:flex;align-items:center;gap:7px;}
.ms-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.ms-dot.done{background:var(--success);}.ms-dot.pending{background:#C5D5D8;}
.ms-dot.at-risk{background:#D4820A;}.ms-dot.overdue{background:var(--danger);}
.ms-name{flex:1;color:var(--text);font-size:12px;line-height:1.4;}
.ms-badge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:500;white-space:nowrap;}
.ms-badge.done{background:#E1F5EE;color:var(--success);}
.ms-badge.pending{background:#EEF4F6;color:var(--gray);}
.ms-badge.at-risk{background:#FEF3E2;color:var(--warn);}
.ms-badge.overdue{background:#FDECEC;color:var(--danger);}
.prog-stack{display:flex;flex-direction:column;gap:10px;}
.prog-row{display:flex;flex-direction:column;gap:3px;}
.prog-top{display:flex;justify-content:space-between;font-size:12px;}
.prog-bg{height:5px;background:var(--pale);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--deep);border-radius:3px;transition:width .4s;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.stat-box{background:var(--pale);border-radius:8px;padding:.7rem .5rem;text-align:center;}
.stat-val{font-size:20px;font-weight:600;color:var(--deep);}
.stat-lbl{font-size:10px;color:var(--gray);margin-top:2px;line-height:1.3;}
/* Coach nav */
.coach-nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.coach-nav::-webkit-scrollbar{display:none;}
.c-tab{display:flex;align-items:center;gap:6px;padding:10px 18px;font-size:14px;font-weight:500;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;flex-shrink:0;}
.c-tab.active{color:var(--deep);border-bottom-color:var(--deep);}
.av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;}
.av-b{background:#DBEAFE;color:#1D6FA4;}
.av-m{background:#DCFCE7;color:#1A7A4A;}
.av-c{background:#DCFCE7;color:#1A7A4A;}
/* Panel */
.c-panel{display:none;background:var(--white);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);}
.c-panel.active{display:block;}
.panel-body{padding:1rem;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sec-lbl{font-size:11px;font-weight:500;color:var(--mid);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.fsec{margin-bottom:.875rem;}
/* Task list */
.task-add{display:flex;gap:6px;margin-bottom:6px;}
.task-add input{flex:1;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:14px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none;min-width:0;}
.task-add input:focus{border-color:var(--mid);background:#fff;}
.btn-plus{background:var(--pale);border:1px solid var(--border);border-radius:8px;min-width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--mid);flex-shrink:0;}
.task-items{display:flex;flex-direction:column;gap:4px;}
.task-row{display:flex;align-items:center;gap:8px;padding:10px;background:var(--pale);border-radius:8px;font-size:13px;}
.task-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--deep);flex-shrink:0;}
.task-txt{flex:1;color:var(--text);line-height:1.4;}
.task-txt.done{text-decoration:line-through;color:#9CA3AF;}
.task-del{background:none;border:none;cursor:pointer;color:#C5D5D8;font-size:18px;padding:0 4px;line-height:1;min-width:28px;}
textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;font-family:var(--font);color:var(--text);background:var(--bg);resize:vertical;min-height:80px;outline:none;line-height:1.6;}
textarea:focus{border-color:var(--mid);background:#fff;}
.blocker-wrap textarea{border-left:3px solid #D4820A;}
.score-btns{display:flex;gap:6px;margin-top:4px;}
.score-btn{flex:1;height:42px;border:1px solid var(--border);border-radius:8px;background:var(--pale);font-size:15px;font-weight:500;cursor:pointer;color:var(--gray);font-family:var(--font);}
.score-btn.sel{background:var(--deep);border-color:var(--deep);color:#fff;}
.ms-form{display:flex;flex-direction:column;gap:5px;}
.ms-form-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--pale);border-radius:8px;}
.ms-form-name{flex:1;color:var(--text);font-size:13px;line-height:1.4;}
.ms-form-dl{font-size:11px;color:var(--gray);white-space:nowrap;}
.ms-sel{border:1px solid var(--border);border-radius:6px;padding:5px 6px;font-size:12px;font-family:var(--font);color:var(--text);background:#fff;cursor:pointer;outline:none;min-width:68px;}
/* Task master */
.tasks-master{padding:0 1rem 1rem;}
.tmaster-hdr{font-size:11px;font-weight:500;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.65rem;display:flex;align-items:center;justify-content:space-between;}
.week-block{margin-bottom:.6rem;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.week-block.wind-down{border-color:#E8D5B0;}
.wbhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--pale);cursor:pointer;user-select:none;gap:8px;}
.week-block.wind-down .wbhdr{background:#FDF8F0;}
.wbtitle{font-size:13px;font-weight:500;color:var(--deep);display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.wbrange{font-size:11px;color:var(--gray);}
.wbbody{padding:10px;display:flex;flex-direction:column;gap:6px;}
.wbbody.collapsed{display:none;}
.phase-tag{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;white-space:nowrap;}
.phase-main{background:#DCE9EC;color:var(--deep);}
.phase-wind{background:#FEF3E2;color:var(--warn);}
.tmi{display:flex;align-items:flex-start;gap:10px;padding:10px;background:var(--white);border-radius:8px;border-left:3px solid transparent;}
.tmi.must{border-left-color:var(--deep);}.tmi.opt{border-left-color:#C5D5D8;}
.tmi.completed{border-left-color:var(--success);opacity:.55;}
.tmi-chk{width:18px;height:18px;cursor:pointer;accent-color:var(--deep);flex-shrink:0;margin-top:2px;}
.tmi-body{flex:1;min-width:0;}
.tmi-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;}
.tmi-name.stk{text-decoration:line-through;color:#9CA3AF;}
.tmi-kpi{font-size:12px;color:var(--gray);margin-top:3px;line-height:1.55;}
.tmi-tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.tmi-tag{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;white-space:nowrap;}
.tag-must{background:#DCE9EC;color:var(--deep);}
.tag-opt{background:#F3F4F6;color:var(--gray);}
.tag-dl{background:#FEF3E2;color:var(--warn);}
.tag-done{background:#E1F5EE;color:var(--success);}
/* Daily practice checklist */
.daily-check{background:var(--pale);border-radius:8px;padding:10px 12px;margin-top:6px;}
.daily-check-lbl{font-size:11px;font-weight:500;color:var(--gray);margin-bottom:8px;}
.daily-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.day-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;background:#fff;border-radius:7px;border:1px solid var(--border);cursor:pointer;}
.day-btn.checked{background:#E1F5EE;border-color:var(--success);}
.day-name{font-size:10px;color:var(--gray);}
.day-chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;}
.day-btn.checked .day-chk{background:var(--success);border-color:var(--success);color:#fff;font-size:11px;}
.day-btn.checked .day-name{color:var(--success);font-weight:500;}
/* Field blocks */
.field-block{background:var(--pale);border-radius:8px;padding:10px 12px;margin-top:6px;}
.field-block-lbl{font-size:11px;color:var(--gray);font-weight:500;margin-bottom:7px;line-height:1.4;}
.field-row{display:grid;gap:6px;margin-bottom:6px;}
.field-row.r2{grid-template-columns:1fr 1fr;}
.field-row.r3{grid-template-columns:1fr 1fr 1fr;}
.field-item label{font-size:10px;color:var(--gray);display:block;margin-bottom:3px;}
.f-inp{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 9px;font-size:13px;font-family:var(--font);color:var(--text);background:#fff;outline:none;}
.f-inp:focus{border-color:var(--mid);}
.f-inp::placeholder{color:#B0BEC5;}
.field-sep{border:none;border-top:1px solid var(--border);margin:8px 0;}
.field-post-num{font-size:11px;font-weight:500;margin-bottom:4px;}
.ig-rec{display:inline-flex;align-items:center;gap:4px;background:#E1F5EE;color:var(--success);font-size:10px;padding:2px 8px;border-radius:8px;margin-top:5px;}
/* Shoot plan */
.shoot-block{background:#FDF8F0;border:1px solid #E8D5B0;border-radius:8px;padding:10px 12px;margin-top:6px;}
.shoot-block-lbl{font-size:11px;color:var(--warn);font-weight:500;margin-bottom:7px;}
.shoot-item{background:#fff;border-radius:7px;padding:9px 10px;margin-bottom:6px;border-left:2px solid #D4820A;}
.shoot-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.shoot-num{font-size:11px;font-weight:500;color:var(--warn);}
.shoot-del{background:none;border:none;cursor:pointer;color:#C5D5D8;font-size:16px;padding:0 4px;}
.s-inp{width:100%;border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-size:13px;font-family:var(--font);color:var(--text);background:#fff;outline:none;}
.s-inp:focus{border-color:#D4820A;}
.s-lbl{font-size:10px;color:var(--gray);margin-bottom:3px;}
.btn-add-shoot{width:100%;padding:9px;background:none;border:1px dashed #D4820A;border-radius:7px;cursor:pointer;font-size:13px;color:var(--warn);font-family:var(--font);margin-top:2px;}
/* LV Framework - new design */
.lv-framework{background:var(--pale);border-radius:8px;padding:10px 12px;margin-top:6px;}
.lv-framework-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;flex-wrap:wrap;}
.lv-framework-title{font-size:13px;font-weight:500;color:var(--deep);}
.lv-add-btn{font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;color:var(--mid);font-family:var(--font);white-space:nowrap;}
.lv-hint{font-size:11px;color:#9CA3AF;font-style:italic;margin-top:6px;}
.lv-item{background:#fff;border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--mid);position:relative;}
.lv-item-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.lv-badge{font-size:12px;font-weight:600;color:var(--deep);background:var(--light);padding:3px 10px;border-radius:6px;white-space:nowrap;}
.lv-badge-inp{font-size:12px;font-weight:600;color:var(--deep);background:var(--light);border:1px solid var(--border);border-radius:6px;padding:3px 8px;width:70px;font-family:var(--font);outline:none;text-align:center;}
.lv-drag{cursor:grab;color:#C5D5D8;font-size:16px;padding:0 4px;user-select:none;touch-action:none;}
.lv-drag:active{cursor:grabbing;}
.lv-del-btn{background:none;border:none;cursor:pointer;color:#C5D5D8;font-size:16px;margin-left:auto;padding:0 4px;}
.lv-del-btn:active{color:var(--danger);}
.lv-grid-4{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.lv-inp{width:100%;border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-size:12px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none;}
.lv-inp:focus{border-color:var(--mid);background:#fff;}
.lv-inp-full{width:100%;border:1px solid var(--border);border-radius:6px;padding:7px 9px;font-size:12px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none;resize:vertical;min-height:60px;}
.lv-inp-full:focus{border-color:var(--mid);background:#fff;}
.lv-field-lbl{font-size:10px;color:var(--gray);margin-bottom:3px;}
.lv-item.dragging{opacity:.4;border:2px dashed var(--mid);}
.lv-item.drag-over{border-top:3px solid var(--deep);}
/* Teaching content (per-LV detail) */
.teach-block{background:#F0F7F8;border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:4px;}
.teach-block-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:6px;}
.teach-block-title{font-size:11px;font-weight:500;color:var(--mid);}
.teach-step{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;background:#fff;border-radius:7px;margin-bottom:5px;border-left:2px solid var(--border);}
.teach-step-num{font-size:10px;font-weight:600;color:var(--mid);min-width:20px;margin-top:1px;}
.teach-step-inp{flex:1;border:none;background:transparent;font-size:12px;font-family:var(--font);color:var(--text);outline:none;resize:none;min-height:22px;line-height:1.5;}
.teach-step-del{background:none;border:none;cursor:pointer;color:#C5D5D8;font-size:14px;padding:0 3px;flex-shrink:0;}
.teach-step-drag{cursor:grab;color:#C5D5D8;font-size:14px;padding:0 3px;flex-shrink:0;user-select:none;}
.btn-add-step{width:100%;padding:6px;background:none;border:1px dashed var(--border);border-radius:6px;cursor:pointer;font-size:12px;color:var(--gray);font-family:var(--font);margin-top:3px;}
.teach-note{width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:12px;font-family:var(--font);color:var(--text);background:#fff;resize:vertical;min-height:50px;outline:none;margin-top:5px;}
/* Save bar */
.save-bar{border-top:1px solid var(--border);padding:.7rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.save-info{font-size:12px;color:var(--gray);}
.save-info strong{color:var(--mid);}
.save-btns{display:flex;gap:8px;}
.btn-save{background:var(--deep);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);}
.btn-clr{background:none;color:var(--gray);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;font-family:var(--font);}
hr.sep{border:none;border-top:1px solid var(--border);margin:.5rem 0;}
/* Hist */
.hist-section{padding:0 1rem 1.5rem;}
.hist-title{font-size:11px;font-weight:500;color:var(--gray);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem;}
.hist-list{display:flex;flex-direction:column;gap:7px;}
.hist-item{background:var(--pale);border:1px solid var(--border);border-radius:9px;padding:.8rem 1rem;cursor:pointer;}
.hist-top{display:flex;justify-content:space-between;margin-bottom:4px;gap:8px;}
.hist-week{font-size:13px;font-weight:500;color:var(--deep);}
.hist-score{font-size:12px;background:var(--light);color:var(--deep);padding:2px 8px;border-radius:8px;font-weight:500;white-space:nowrap;}
.hist-prev{font-size:12px;color:var(--gray);line-height:1.4;}
/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:flex-end;justify-content:center;}
.modal.open{display:flex;}
.modal-box{background:#fff;border-radius:16px 16px 0 0;padding:1.25rem 1rem;width:100%;max-width:480px;max-height:80vh;display:flex;flex-direction:column;}
.modal-box h3{font-size:15px;font-weight:600;color:var(--deep);margin-bottom:1rem;}
.wk-list{display:flex;flex-direction:column;gap:5px;overflow-y:auto;}
.wk-opt{padding:12px 14px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--text);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.wk-opt.cur{background:var(--light);border-color:var(--deep);color:var(--deep);font-weight:500;}
.modal-close{margin-top:.85rem;width:100%;padding:12px;background:none;border:1px solid var(--border);border-radius:10px;cursor:pointer;font-size:14px;color:var(--gray);font-family:var(--font);}
/* Toast */
.toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%) translateY(10px);background:var(--deep);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .2s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* Responsive */
@media(max-width:600px){
  .hdr-logo span{display:none;}
  .dash{grid-template-columns:1fr;}
  .two-col{grid-template-columns:1fr;}
  .field-row.r3{grid-template-columns:1fr;}
  .field-row.r2{grid-template-columns:1fr;}
  .lv-grid-4{grid-template-columns:1fr;}
  .daily-grid{grid-template-columns:repeat(7,1fr);}
  .c-tab{padding:10px 12px;font-size:13px;}
}
@media(min-width:601px) and (max-width:900px){
  .dash{grid-template-columns:1fr 1fr;}
  .field-row.r3{grid-template-columns:1fr 1fr;}
}

/* ── Founder panel ── */
.founder-panel-inner{padding:1rem;}
.founder-week-block{margin-bottom:.6rem;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.founder-wbhdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#F3E8FF;cursor:pointer;gap:8px;}
.founder-wbtitle{font-size:13px;font-weight:500;color:#6B21A8;display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.founder-wbbody{padding:10px;display:flex;flex-direction:column;gap:6px;}
.founder-wbbody.collapsed{display:none;}
.founder-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--white);border-radius:8px;border-left:3px solid #A855F7;}
.founder-item.status-done{border-left-color:var(--success);}
.founder-item.status-upcoming{border-left-color:var(--border);}
.founder-item-body{flex:1;}
.founder-item-name{font-size:13px;font-weight:500;color:var(--text);}
.founder-item-note{font-size:12px;color:var(--gray);margin-top:3px;line-height:1.5;}
.founder-status{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.s-done{background:#E1F5EE;color:var(--success);}
.s-ongoing{background:#F3E8FF;color:#6B21A8;}
.s-upcoming{background:#F3F4F6;color:var(--gray);}
.founder-note-area{padding:1rem 1rem 0;}
.founder-note-label{font-size:11px;font-weight:500;color:#6B21A8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}

function buildWeekUI(){
  document.getElementById('cur-wk-lbl').textContent=WEEKS[curWeek].lbl;
  COACHES.forEach(c=>{const el=document.getElementById(`${c}-wk-lbl`);if(el)el.textContent=WEEKS[curWeek].lbl;});
  document.getElementById('wk-list').innerHTML=WEEKS.map((w,i)=>
    `<div class="wk-opt ${i===curWeek?'cur':''}" onclick="selectWeek(${i})">${w.lbl} <span style="color:#9CA3AF;font-size:12px;">${w.range}</span></div>`
  ).join('');
}
function selectWeek(i){curWeek=i;buildWeekUI();COACHES.forEach(c=>{renderCoach(c);renderHist(c);});updateDash();closeWeekModal();}
function openWeekModal(){document.getElementById('wk-modal').classList.add('open');}
function closeWeekModal(){document.getElementById('wk-modal').classList.remove('open');}

function renderCoach(c){
  const d=loadR(c,curWeek);
  renderTL(c,'done',d.done);renderTL(c,'plan',d.plan);
  const el=document.getElementById(`${c}-blocker`);
  if(el) el.value=d.blocker||'';
  renderScore(c,d.score);
}
function renderTL(c,type,tasks){
  const el=document.getElementById(`${c}-${type}-list`);
  if(!el) return;
  el.innerHTML=(tasks||[]).map((t,i)=>
    `<div class="task-row">
      <input type="checkbox" ${t.done?'checked':''} onchange="toggleTask('${c}','${type}',${i})">
      <span class="task-txt ${t.done?'done':''}">${esc(t.text)}</span>
      <button class="task-del" onclick="removeTask('${c}','${type}',${i})">×</button>
    </div>`
  ).join('');
}
function addTask(c,type){
  const inp=document.getElementById(`${c}-${type}-inp`);if(!inp)return;
  const txt=inp.value.trim();if(!txt)return;
  const d=loadR(c,curWeek);if(!d[type])d[type]=[];d[type].push({text:txt,done:false});
  saveR(c,curWeek,d);renderTL(c,type,d[type]);inp.value='';
}
function toggleTask(c,type,i){const d=loadR(c,curWeek);d[type][i].done=!d[type][i].done;saveR(c,curWeek,d);renderTL(c,type,d[type]);updateDash();}
function removeTask(c,type,i){const d=loadR(c,curWeek);d[type].splice(i,1);saveR(c,curWeek,d);renderTL(c,type,d[type]);}
function setScore(c,v){const d=loadR(c,curWeek);d.score=v;saveR(c,curWeek,d);renderScore(c,v);}
function renderScore(c,v){
  const col=COACH_COLORS[c]||'var(--deep)';
  document.querySelectorAll(`#${c}-score .score-btn`).forEach((b,i)=>{
    b.classList.toggle('sel',i+1===v);
    if(i+1===v){b.style.background=col;b.style.borderColor=col;}
    else{b.style.background='';b.style.borderColor='';}
  });
}
function saveCoach(c){
  const d=loadR(c,curWeek);
  const el=document.getElementById(`${c}-blocker`);
  if(el) d.blocker=el.value;
  saveR(c,curWeek,d);
  renderHist(c);updateDash();
  showSyncStatus('🔄 同步中...');
  // Re-load after save to ensure latest data is synced
  const saved=loadR(c,curWeek);
  gsPost({action:'upsert', table:'weekly_reports', keyField:'coach_week', keyValue:c+'_'+curWeek,
    record:{coach:c, week:curWeek,
      done_tasks:JSON.stringify(saved.done||[]),
      plan_tasks:JSON.stringify(saved.plan||[]),
      blocker:saved.blocker||'',
      score:saved.score||0,
      updated_at:new Date().toISOString()
    }
  }).then(()=>showSyncStatus('✓ 已同步至 Google Sheets',true));
  showToast(`${NAMES[c]} 週報已儲存 ✓`);
}
function clearCoach(c){
  if(!confirm(`確定清除 ${NAMES[c]} 本週所有內容？`))return;
  saveR(c,curWeek,{done:[],plan:[],blocker:'',score:0});renderCoach(c);showToast('已清除');
}

// LV CRUD
function updLV(key,idx,field,val){

function addLVRow(key){
  const c=key==='benson_lv'?'benson':'cc';

  saveLV(key,rows);renderMaster(c);

function delLVRow(key,idx){
  if(!confirm('確定刪除此級別？'))return;

  const rows=loadLV(key);rows.splice(idx,1);saveLV(key,rows);
  renderMaster(c);
  openWBs.forEach(bid=>{const el=document.getElementById(bid);const arr=document.getElementById('arr_'+bid);if(el){el.classList.remove('collapsed');if(arr)arr.textContent='▴';}});

// LV drag & drop
let lvDragIdx=null,lvDragKey=null;
function dragStart(e,key,idx){lvDragKey=key;lvDragIdx=idx;e.currentTarget.classList.add('dragging');}
function dragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over');}
function dragDrop(e,key,toIdx){
  e.preventDefault();
  document.querySelectorAll('.lv-item').forEach(el=>el.classList.remove('drag-over'));
  if(lvDragKey!==key||lvDragIdx===toIdx)return;
  const c=key==='benson_lv'?'benson':'cc';
  const openWBs=getOpenWBs(c);
  const rows=loadLV(key);
  const [moved]=rows.splice(lvDragIdx,1);
  rows.splice(toIdx,0,moved);
  saveLV(key,rows);renderMaster(c);
  openWBs.forEach(bid=>{const el=document.getElementById(bid);const arr=document.getElementById('arr_'+bid);if(el){el.classList.remove('collapsed');if(arr)arr.textContent='▴';}});
}
function dragEnd(e){e.currentTarget.classList.remove('dragging');}

// Step drag & drop
let stepDragLvKey=null,stepDragLvIdx=null,stepDragStepIdx=null;
function stepDragStart(e,lvKey,lvIdx,stepIdx){stepDragLvKey=lvKey;stepDragLvIdx=lvIdx;stepDragStepIdx=stepIdx;e.stopPropagation();}
function stepDrop(e,lvKey,lvIdx,toStepIdx){
  e.preventDefault();e.stopPropagation();
  if(stepDragLvKey!==lvKey||stepDragLvIdx!==lvIdx||stepDragStepIdx===toStepIdx)return;
  const c=lvKey==='benson_lv'?'benson':'cc';
  const openWBs=getOpenWBs(c);
  const rows=loadLV(lvKey);
  const steps=rows[lvIdx].steps;
  const [moved]=steps.splice(stepDragStepIdx,1);
  steps.splice(toStepIdx,0,moved);
  saveLV(lvKey,rows);renderMaster(c);
  openWBs.forEach(bid=>{const el=document.getElementById(bid);const arr=document.getElementById('arr_'+bid);if(el){el.classList.remove('collapsed');if(arr)arr.textContent='▴';}});
}

// ── Render master task list ──
function renderMaster(c){
  const weeks=TASKS[c];const done=loadTD(c);
  const el=document.getElementById(`${c}-tasks-master`);if(!el)return;
  el.innerHTML=weeks.map((wk,wi)=>{
    const mustAll=wk.items.filter(t=>t.must).every(t=>done[t.id]);
    const bid=`wb_${c}_${wi}`;const open=false;
    return `<div class="week-block ${wk.wind?'wind-down':''}">
      <div class="wbhdr" onclick="toggleWB('${bid}')">
        <span class="wbtitle">
          <span class="phase-tag ${wk.wind?'phase-wind':'phase-main'}">${wk.wind?'收尾':'主力'}</span>
          ${WEEKS[wk.w].lbl} <span class="wbrange">${WEEKS[wk.w].range}</span>
        </span>
        <span style="display:flex;align-items:center;gap:6px;flex-shrink:0;">
          ${mustAll?'<span class="tmi-tag tag-done">✓ 完成</span>':''}
          <span id="arr_${bid}" style="color:var(--gray);font-size:13px;">${open?'▴':'▾'}</span>
        </span>
      </div>
      <div class="wbbody ${open?'':'collapsed'}" id="${bid}">
        ${wk.items.map(t=>{
          const isDone=done[t.id]||false;
          const cls=isDone?'completed':t.must?'must':'opt';
          let extra='';
          if(t.lv) extra=renderLV(t.lvKey,t.lvBasic,t.lvFull);
          else if(t.ig) extra=renderIG(t.igKey,t.igHint,t.multi);
          else if(t.vid) extra=renderVid(t.vidKey,t.vidHint);
          else if(t.shoot) extra=renderShoot(t.shootKey,t.shootType);
          else if(t.daily) extra=renderDaily(t.dailyKey);
          return `<div class="tmi ${cls}">
            <input type="checkbox" class="tmi-chk" ${isDone?'checked':''} onchange="toggleMT('${c}','${t.id}',this.checked)">
            <div class="tmi-body">
              <div class="tmi-name ${isDone?'stk':''}">${t.name}</div>
              ${t.kpi?`<div class="tmi-kpi">${t.kpi}</div>`:''}
              ${extra}
              <div class="tmi-tags">
                <span class="tmi-tag ${t.must?'tag-must':'tag-opt'}">${t.must?'必做':'選做'}</span>
                <span class="tmi-tag tag-dl">期限 ${t.dl}</span>
                ${isDone?'<span class="tmi-tag tag-done">已完成</span>':''}
              </div>
              ${isDone?`<div style="display:flex;align-items:center;gap:5px;margin-top:5px;">
                <span style="font-size:10px;color:#6B7B80;">✓ 完成日期：</span>
                <input type="date" style="border:1px solid #C8D8DC;border-radius:6px;padding:3px 7px;font-size:11px;font-family:var(--font);color:#284957;background:#fff;outline:none;cursor:pointer;" value="${loadTDate(c,t.id)}" onchange="saveTDate('${c}','${t.id}',this.value)">
              </div>`:''}
            </div></div>`;
        }).join('')}
        ${(()=>{
          const wTasks=loadWTask(c,wk.w);
          const wTaskRows=wTasks.map((t,i)=>`
            <div class="task-row" style="background:#fff;border:1px solid var(--border);">
              <input type="checkbox" ${t.done?'checked':''} style="width:16px;height:16px;cursor:pointer;accent-color:${COACH_COLORS[c]||'var(--deep)'};" onchange="toggleWTask('${c}',${wk.w},${i})">
              <span class="task-txt ${t.done?'done':''}">${esc(t.text)}</span>
              ${loadTDate(c,t.id)?`<span style="font-size:11px;color:var(--gray);white-space:nowrap;margin-right:4px;">✓ ${loadTDate(c,t.id)}</span>`:''}
              <button class="task-del" onclick="delWTask('${c}',${wk.w},${i})">×</button>
            </div>`).join('');
          return `<div style="margin-top:4px;padding-top:6px;border-top:1px dashed var(--border);">
            ${wTaskRows}
            <div style="display:flex;gap:5px;margin-top:5px;">
              <input id="wtask_inp_${c}_${wk.w}" style="flex:1;border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none;min-width:0;" placeholder="本週新增額外任務…" onkeydown="if(event.key==='Enter')addWTask('${c}',${wk.w})">
              <button style="border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;border:1px solid ${COACH_COLORS[c]||'var(--deep)'};background:transparent;color:${COACH_COLORS[c]||'var(--deep)'};font-family:var(--font);white-space:nowrap;" onclick="addWTask('${c}',${wk.w})">＋ 新增</button>
            </div>
          </div>`;
        })()}
      </div></div>`;
  }).join('');
}
function getOpenWBs(c){
  const open=[];
  document.querySelectorAll(`[id^="wb_${c}_"]`).forEach(el=>{
    if(!el.classList.contains('collapsed')) open.push(el.id);
  });
  return open;
}
function toggleWB(bid){
  const el=document.getElementById(bid);const arr=document.getElementById('arr_'+bid);
  const c=el.classList.toggle('collapsed');if(arr)arr.textContent=c?'▾':'▴';
}
function toggleMT(c,id,checked){
  const openWBs=getOpenWBs(c);
  const d=loadTD(c);d[id]=checked;saveTD(c,d);
  renderMaster(c);
  openWBs.forEach(bid=>{
    const el=document.getElementById(bid);
    const arr=document.getElementById('arr_'+bid);
    if(el){el.classList.remove('collapsed');if(arr)arr.textContent='▴';}
  });
  updateDash();
  fbSaveTask(c,id,checked,loadTDate(c,id));
}

function renderHist(c){
  const el=document.getElementById(`${c}-hist`);if(!el)return;
  const entries=[];
  for(let w=0;w<WEEKS.length;w++){
    const d=loadR(c,w);
    if((d.done&&d.done.length)||(d.plan&&d.plan.length)||d.blocker||d.score)entries.unshift({w,d});
  }
  if(!entries.length){el.innerHTML='<div style="font-size:13px;color:#9CA3AF;padding:6px 0;">尚無歷史週報</div>';return;}
  el.innerHTML=entries.map(e=>`<div class="hist-item" onclick="selectWeek(${e.w})">
    <div class="hist-top">
      <span class="hist-week">${WEEKS[e.w].lbl} <span style="font-weight:400;color:#9CA3AF;font-size:11px;">${WEEKS[e.w].range}</span></span>
      ${e.d.score?`<span class="hist-score">⭐ ${e.d.score}/5</span>`:''}
    </div>
    <div class="hist-prev">
      ${e.d.done&&e.d.done.length?`完成 ${e.d.done.length} 項`:''}
      ${e.d.done&&e.d.done.length&&e.d.blocker?'・':''}
      ${e.d.blocker?`卡點：${e.d.blocker.slice(0,30)}…`:''}
      ${!e.d.done?.length&&!e.d.blocker?'點擊查看':''}
    </div></div>`
  ).join('');
}

function updateDash(){
  const msFlat=[
    ...MILESTONES.benson.map(m=>({...m,coach:'benson'})),
    ...MILESTONES.cc.map(m=>({...m,coach:'cc'})),
    ...FOUNDER_MS.darren.map(m=>({...m,coach:'darren'})),
    ...FOUNDER_MS.vivi.map(m=>({...m,coach:'vivi'})),
  ];
  const msD={};
  ['benson','cc'].forEach(c=>{msD[c]=loadMs(c);});
  ['darren','vivi'].forEach(c=>{msD[c]=loadFMs(c);});
  const pending=msFlat.filter(m=>(msD[m.coach][m.key]||'pending')!=='done').slice(0,5);
  const stL={pending:'進行中',done:'完成','at-risk':'風險',overdue:'延遲'};
  document.getElementById('dash-ms').innerHTML=pending.length
    ?pending.map(m=>{const st=msD[m.coach][m.key]||'pending';
      return `<div class="ms-row"><div class="ms-dot ${st}"></div><span class="ms-name">${NAMES[m.coach]}・${m.name}</span><span class="ms-badge ${st}">${stL[st]}</span></div>`;
    }).join('')
    :'<div style="font-size:12px;color:var(--success);">所有里程碑完成 🎉</div>';
  const allProgs=[
    ...['benson','cc'].map(c=>{
      const td=loadTD(c);const must=TASKS[c].flatMap(wk=>wk.items.filter(t=>t.must));
      const pct=must.length?Math.round(must.filter(t=>td[t.id]).length/must.length*100):0;
      return {name:NAMES[c],pct,color:'var(--deep)'};
    }),
    ...['darren','vivi'].map(c=>{
      const td=loadFT(c);const all=FOUNDER_TASKS[c].flatMap(cat=>cat.items.filter(t=>t.must));
      const pct=all.length?Math.round(all.filter(t=>td[t.id]).length/all.length*100):0;
      return {name:NAMES[c],pct,color:c==='darren'?'#D4820A':'#D946A8'};
    }),
  ];
  document.getElementById('dash-prog').innerHTML=allProgs.map(p=>
    `<div class="prog-row"><div class="prog-top"><span style="font-size:12px;color:var(--text)">${p.name}</span><span style="font-size:12px;font-weight:500;color:${p.color}">${p.pct}%</span></div><div class="prog-bg"><div class="prog-fill" style="width:${p.pct}%;background:${p.color};"></div></div></div>`
  ).join('');
  let td2=0,bl=0;
  ['benson','cc'].forEach(c=>{const d=loadR(c,curWeek);td2+=(d.done||[]).filter(t=>t.done).length;if(d.blocker&&d.blocker.trim())bl++;});
  const days=Math.max(0,72-(curWeek*7));
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat-box"><div class="stat-val">${td2}</div><div class="stat-lbl">本週完成事項</div></div>
    <div class="stat-box"><div class="stat-val">${bl}</div><div class="stat-lbl">待解卡點</div></div>
    <div class="stat-box"><div class="stat-val">${curWeek+1}/10</div><div class="stat-lbl">目前週次</div></div>
    <div class="stat-box"><div class="stat-val">${days}</div><div class="stat-lbl">距 7/1 天數</div></div>`;
}

const GS_URL = 'https://script.google.com/macros/s/AKfycbxTkL6GYyhMCylPs-uvUU2LLIQdHjsxxN0HXACmLFDTkH5eNfvNy6UQli5HOrY7MCxd/exec';

async function gsPost(body) {
  try {
    // Use JSONP to bypass CORS for both read and write
    return await new Promise((resolve, reject) => {
      const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const params = new URLSearchParams({
        callback: cbName,
        payload: JSON.stringify(body)
      });
      const script = document.createElement('script');
      const timer = setTimeout(() => {
        delete window[cbName];
        document.body.removeChild(script);
        reject(new Error('timeout'));
      }, 10000);
      window[cbName] = (data) => {
        clearTimeout(timer);
        delete window[cbName];
        document.body.removeChild(script);
        resolve(data);
      };
      script.src = GS_URL + '?' + params.toString();
      script.onerror = () => {
        clearTimeout(timer);
        delete window[cbName];
        document.body.removeChild(script);
        reject(new Error('script error'));
      };
      document.body.appendChild(script);
    });
  } catch(e) { console.warn('GS error:', e); return null; }
}

async function loadFromSheets() {
  showSyncStatus('🔄 同步中...');
  try {
    const [reports, tasks, customs] = await Promise.all([
      gsPost({action:'get', table:'weekly_reports'}),
      gsPost({action:'get', table:'task_status'}),
      gsPost({action:'get', table:'custom_data'}),
    ]);
    if (Array.isArray(reports)) {
      reports.forEach(r => {
        if (!r.coach || r.week === undefined) return;
        const d = { done:tryParse(r.done_tasks,[]), plan:tryParse(r.plan_tasks,[]), blocker:r.blocker||'', score:Number(r.score)||0 };
        if (d.blocker || d.done.length || d.score) saveR(r.coach, parseInt(r.week), d);
      });
    }
    if (Array.isArray(tasks)) {
      const tm = {};
      tasks.forEach(t => {
        if (!tm[t.coach]) tm[t.coach] = {};
        tm[t.coach][t.task_id] = t.done === '1';
        if (t.done_date) localStorage.setItem(tdk(t.coach, t.task_id), t.done_date);
      });
      Object.keys(tm).forEach(c => saveTD(c, tm[c]));
    }
    if (Array.isArray(customs)) {
      customs.forEach(row => {
        if (row.key && row.value) {
          try {
            const v = JSON.parse(row.value);
            if (row.key.startsWith('fnote_')) localStorage.setItem('skio_fnote_'+row.key.slice(6), v);
            if (row.key.startsWith('ftask_')) saveFT(row.key.slice(6), v);
            if (row.key.startsWith('fms_')) saveFMs(row.key.slice(4), v);
            if (row.key.startsWith('fmsc_')) saveFMsCustom(row.key.slice(5), v);
            if (row.key.startsWith('lv_')) {
              const lvKey = row.key.slice(3);
              if (Array.isArray(v) && v.length > 0) saveLV(lvKey, v);
            }
          } catch(e) {}
        }
      });
    }
    showSyncStatus('✓ 已同步', true);
  } catch(e) {
    showSyncStatus('⚠ 同步失敗', false);
  }
}

function tryParse(s, fallback) { try { return JSON.parse(s); } catch(e) { return fallback; } }

  if (ok !== undefined) setTimeout(()=>{el.style.opacity='0';}, 3000);
}

// 監聽即時更新（其他人改了，我的畫面自動更新）
function fbStartListening() {
  db.ref('reports').on('value', snap => {
    if(!snap.exists()) return;
    if(_fbSelfUpdate) return;
    const reports = snap.val();
    Object.keys(reports).forEach(c => {
      Object.keys(reports[c]).forEach(wk => {
        const w = parseInt(wk.replace('w',''));
        const d = reports[c][wk];
        if(d) saveR(c, w, {done:d.done||[], plan:d.plan||[], blocker:d.blocker||'', score:d.score||0});
      });
    });
    // Only update visible elements without re-rendering
    COACHES.filter(c=>c!=='darren'&&c!=='vivi').forEach(c=>{
      const d = loadR(c, curWeek);
      // Update blocker
      const blockerEl = document.getElementById(c+'-blocker');
      if(blockerEl) blockerEl.value = d.blocker||'';
      // Update score buttons
      const scoreBtns = document.querySelectorAll(`#${c}-score .score-btn`);
      scoreBtns.forEach((btn,i)=>{
        if(i+1===d.score) btn.classList.add('active');
        else btn.classList.remove('active');
      });
      // Update done/plan lists
      renderCoach(c);
      renderHist(c);
    });
    updateDash();
  });

  db.ref('tasks').on('value', snap => {
    if(!snap.exists()) return;
    if(_fbSelfTaskUpdate) return;
    const tasks = snap.val();
    Object.keys(tasks).forEach(c => {
      const td = loadTD(c);
      Object.keys(tasks[c]).forEach(id => {
        const prevDone = td[id]||false;
        td[id] = tasks[c][id].done||false;
        if(tasks[c][id].doneDate) localStorage.setItem(tdk(c,id), tasks[c][id].doneDate);
        // Update DOM directly without re-rendering
        if(prevDone !== td[id]) {
          const chk = document.querySelector(`input[onchange*="toggleMT('${c}','${id}'"]`);
          if(chk) {
            chk.checked = td[id];
            const row = chk.closest('.task-row');
            if(row) {
              if(td[id]) { row.classList.add('t-done'); row.classList.remove('must'); }
              else { row.classList.remove('t-done'); row.classList.add('must'); }
              const txt = row.querySelector('.task-txt');
              if(txt) { if(td[id]) txt.classList.add('done'); else txt.classList.remove('done'); }
            }
          }
        }
      });
      saveTD(c, td);
    });
    updateDash();
  });

  db.ref('ms').on('value', snap => {
    if(!snap.exists()) return;
    const ms = snap.val();
    Object.keys(ms).forEach(c => {
      const msData = loadMs(c);
      Object.keys(ms[c]).forEach(key => { msData[key] = ms[c][key]; });
      saveMs(c, msData);
    });
    COACHES.filter(c=>c!=='darren'&&c!=='vivi').forEach(c=>renderMsForm(c));
    updateDash();
  });

  let _fbSelfLVUpdate = false;
  db.ref('lv').on('value', snap => {
    if(!snap.exists()) return;
    if(_fbSelfLVUpdate) return;
    const lv = snap.val();
    if(lv.benson_lv && Array.isArray(lv.benson_lv)) saveLV('benson_lv', lv.benson_lv);
    if(lv.cc_lv && Array.isArray(lv.cc_lv)) saveLV('cc_lv', lv.cc_lv);
    // Only re-render if not currently editing
    if(document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      const openWBs_b = getOpenWBs('benson');
      const openWBs_c = getOpenWBs('cc');
      renderMaster('benson');
      renderMaster('cc');
      openWBs_b.forEach(bid=>{const el=document.getElementById(bid);const arr=document.getElementById('arr_'+bid);if(el){el.classList.remove('collapsed');if(arr)arr.textContent='▴';}});
      openWBs_c.forEach(bid=>{const el=document.getElementById(bid);const arr=document.getElementById('arr_'+bid);if(el){el.classList.remove('collapsed');if(arr)arr.textContent='▴';}});
    }
  });

  db.ref('ftasks').on('value', snap => {
    if(!snap.exists()) return;
    const ftasks = snap.val();
    Object.keys(ftasks).forEach(c => {
      const fd = loadFT(c);
      Object.keys(ftasks[c]).forEach(id => { fd[id] = ftasks[c][id]; });
      saveFT(c, fd);
    });
    ['darren','vivi'].forEach(c=>{if(curCoach===c) buildFounderPanelFor(c);});
    updateDash();
  });
}

function showSyncStatus(msg, ok) {
  const el = document.getElementById('sync-status');
  if(!el) return;
  el.textContent = msg;
  el.style.opacity = '1';
  el.style.color = ok===true?'#A8DCC0':ok===false?'#F5A0A0':'var(--light)';
  if(ok !== undefined) setTimeout(()=>{el.style.opacity='0';}, 3000);
}

init();

</script>
</body>
</html>
